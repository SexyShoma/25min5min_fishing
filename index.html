<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEP FOCUS — 作業タイマー</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #04111e;
  --ocean: #071e34;
  --mid: #0a2d47;
  --surface: #0d3d5e;
  --accent: #29c5dc;
  --gold: #f0c060;
  --coral: #ff6b6b;
  --text: #c8e6f0;
  --muted: #3a6a85;
  --white: #e8f4f8;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--deep);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ===== BUBBLES ===== */
.bubbles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bubble {
  position: absolute;
  bottom: -20px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(41,197,220,0.4), rgba(41,197,220,0.05));
  border: 1px solid rgba(41,197,220,0.2);
  animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(0) translateX(0); opacity: 0.8; }
  50% { transform: translateY(-40vh) translateX(15px); opacity: 0.5; }
  100% { transform: translateY(-110vh) translateX(-10px); opacity: 0; }
}

/* ===== WATER SURFACE ===== */
.water-surface {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, 
    transparent, rgba(41,197,220,0.6), rgba(41,197,220,0.3), 
    transparent, rgba(41,197,220,0.5), transparent);
  animation: waterwave 4s ease-in-out infinite;
  z-index: 1;
}
@keyframes waterwave {
  0%, 100% { opacity: 0.6; transform: scaleX(1); }
  50% { opacity: 1; transform: scaleX(1.02); }
}

/* ===== LAYOUT ===== */
#app {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== WORK SCREEN ===== */
#work-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 20px;
}

.screen-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 30px;
}

.fish-deco {
  font-size: 28px;
  margin-bottom: 6px;
  animation: fishswim 6s ease-in-out infinite;
}
@keyframes fishswim {
  0%, 100% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
}

.timer-wrap {
  position: relative;
  width: 260px; height: 260px;
  margin-bottom: 28px;
}
.timer-svg { position:absolute; inset:0; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(41,197,220,0.08); stroke-width:4; }
.ring-fill { fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round;
  stroke-dasharray:753; stroke-dashoffset:0;
  filter: drop-shadow(0 0 6px rgba(41,197,220,0.5));
  transition: stroke-dashoffset 1s linear; }
.ring-fill.break { stroke: var(--gold); filter: drop-shadow(0 0 6px rgba(240,192,96,0.5)); }
.timer-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 4px;
}
.phase-label {
  font-size: 9px; letter-spacing:0.35em; text-transform:uppercase;
  color: var(--muted);
}
.time-big {
  font-family: 'Playfair Display', serif;
  font-size: 64px; font-weight:700;
  color: var(--white);
  letter-spacing: -2px;
  line-height: 1;
}
.session-dot-row {
  display:flex; gap:5px; margin-top:4px;
}
.sdot {
  width:5px; height:5px; border-radius:50%;
  background: var(--muted);
  transition: background 0.3s;
}
.sdot.done { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

.btns { display:flex; gap:12px; align-items:center; }
.btn {
  font-family:'Space Mono',monospace;
  font-size:11px; letter-spacing:0.1em;
  padding:10px 24px; cursor:pointer;
  border:1px solid var(--muted);
  background:transparent; color:var(--muted);
  text-transform:uppercase;
  transition:all 0.2s;
}
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn-main {
  background:var(--accent); border-color:var(--accent);
  color:var(--deep); font-weight:700;
}
.btn-main:hover { opacity:0.85; color:var(--deep); }

.session-info {
  margin-top: 20px;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--muted);
}
.session-info span { color: var(--accent); }

/* ===== BREAK SCREEN ===== */
#break-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}
#break-screen.active { display:flex; }

.break-top {
  display:flex;
  gap: 0;
  flex:1;
  overflow: hidden;
}

/* Fishing panel */
.fishing-panel {
  width: 55%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding: 16px;
  border-right: 1px solid rgba(41,197,220,0.12);
  position: relative;
}

.break-timer-row {
  display:flex; align-items:center; gap:12px;
  margin-bottom:12px; width:100%;
}
.break-timer-badge {
  background: rgba(240,192,96,0.12);
  border: 1px solid rgba(240,192,96,0.3);
  color: var(--gold);
  font-size:12px; font-weight:700;
  padding:4px 12px; letter-spacing:0.1em;
}
.break-phase { font-size:9px; color:var(--muted); letter-spacing:0.3em; text-transform:uppercase; }

/* Fishing canvas */
#fishingCanvas {
  border: 1px solid rgba(41,197,220,0.1);
  border-radius: 4px;
  cursor: pointer;
  display: block;
}

.fishing-hint {
  margin-top: 8px;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-align: center;
}
.catch-msg {
  height: 20px;
  font-size:11px;
  text-align:center;
  color: var(--gold);
  font-family:'Playfair Display',serif;
  font-style:italic;
  letter-spacing:0.05em;
  transition:opacity 0.5s;
}

/* News panel */
.news-panel {
  width: 45%;
  display:flex;
  flex-direction:column;
  overflow: hidden;
}
.news-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(41,197,220,0.12);
  display:flex; align-items:center; gap:8px;
}
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--coral);
  animation:blink 1.2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
.news-label { font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--muted); }

.news-scroll {
  flex:1; overflow-y:auto; padding:8px 0;
}
.news-scroll::-webkit-scrollbar { width:3px; }
.news-scroll::-webkit-scrollbar-track { background:transparent; }
.news-scroll::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }

.news-item {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(41,197,220,0.06);
  animation: fadeSlide 0.4s ease forwards;
  opacity:0;
}
@keyframes fadeSlide {
  from{opacity:0;transform:translateX(10px);}
  to{opacity:1;transform:translateX(0);}
}
.n-cat {
  font-size:8px; letter-spacing:0.3em; text-transform:uppercase;
  color:var(--coral); margin-bottom:3px;
}
.n-title {
  font-family:'Playfair Display',serif;
  font-size:12px; line-height:1.5;
  color:var(--white); margin-bottom:3px;
}
.n-summary { font-size:10px; color:var(--muted); line-height:1.5; }
.news-loading {
  padding:20px 14px; font-size:10px; color:var(--muted);
  text-align:center; letter-spacing:0.1em;
}

/* News ticker */
.ticker-bar {
  height: 28px; overflow:hidden;
  border-top: 1px solid rgba(41,197,220,0.1);
  display:flex; align-items:center;
  background: rgba(7,30,52,0.8);
  flex-shrink:0;
}
.ticker-inner {
  white-space:nowrap;
  font-size:10px; color:var(--muted);
  animation: ticker 40s linear infinite;
  padding-left:100%;
}
@keyframes ticker {
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}

/* ===== COLLECTION MODAL ===== */
#collection-overlay {
  display:none;
  position:fixed; inset:0; z-index:100;
  background: rgba(4,17,30,0.95);
  backdrop-filter:blur(8px);
  overflow-y:auto;
  padding: 40px 20px;
}
#collection-overlay.open { display:block; }
.collection-wrap {
  max-width:720px; margin:0 auto;
}
.col-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:30px;
}
.col-title {
  font-family:'Playfair Display',serif;
  font-size:32px; font-weight:700;
  color:var(--white); letter-spacing:-0.5px;
}
.col-subtitle {
  font-size:10px; color:var(--muted);
  letter-spacing:0.3em; text-transform:uppercase;
  margin-top:4px;
}
.col-close {
  background:none; border:1px solid var(--muted);
  color:var(--muted); font-family:'Space Mono',monospace;
  font-size:10px; padding:8px 16px; cursor:pointer;
  letter-spacing:0.15em; text-transform:uppercase;
}
.col-close:hover { border-color:var(--accent); color:var(--accent); }

.col-stats {
  display:flex; gap:20px; margin-bottom:24px;
}
.col-stat {
  flex:1; padding:12px 16px;
  background:rgba(41,197,220,0.05);
  border:1px solid rgba(41,197,220,0.12);
}
.cs-label { font-size:8px; letter-spacing:0.35em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.cs-val { font-family:'Playfair Display',serif; font-size:24px; color:var(--accent); }

.fish-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(130px,1fr));
  gap:10px;
}
.fish-card {
  background:rgba(7,30,52,0.8);
  border:1px solid rgba(41,197,220,0.1);
  padding:14px 10px;
  text-align:center;
  transition:all 0.2s;
  position:relative;
}
.fish-card:hover { border-color:rgba(41,197,220,0.4); transform:translateY(-2px); }
.fish-card.undiscovered { opacity:0.3; filter:grayscale(1); }
.fish-card.new-badge::after {
  content:'NEW';
  position:absolute; top:6px; right:6px;
  background:var(--coral); color:white;
  font-size:7px; padding:2px 5px; letter-spacing:0.2em;
}
.fc-emoji { font-size:36px; margin-bottom:6px; display:block; }
.fc-name { font-family:'Playfair Display',serif; font-size:12px; color:var(--white); margin-bottom:3px; }
.fc-rarity { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; }
.rarity-common { color:#7ec8d8; }
.rarity-rare { color:var(--gold); }
.rarity-epic { color:#c87ef0; }
.rarity-legendary { color:var(--coral); }
.fc-count { font-size:9px; color:var(--muted); margin-top:4px; }

/* ===== NOTIFICATION ===== */
.notif {
  position:fixed; bottom:24px; right:24px; z-index:200;
  background:var(--accent); color:var(--deep);
  padding:12px 20px; font-size:11px; font-weight:700;
  letter-spacing:0.1em;
  transform:translateY(80px); opacity:0;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.notif.show { transform:translateY(0); opacity:1; }

/* ===== NAV ===== */
.nav-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 20px;
  border-top:1px solid rgba(41,197,220,0.08);
  flex-shrink:0;
}
.nav-logo {
  font-family:'Playfair Display',serif;
  font-style:italic; font-size:14px;
  color:var(--muted);
}
.nav-right { display:flex; gap:10px; align-items:center; }
.nav-btn {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:0.2em; text-transform:uppercase;
  background:none; border:1px solid rgba(41,197,220,0.15);
  color:var(--muted); padding:6px 14px; cursor:pointer;
  transition:all 0.2s;
}
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.collection-badge {
  background:var(--coral); color:white;
  font-size:9px; padding:2px 6px; border-radius:20px;
  margin-left:-4px; margin-right:2px;
}
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>
<div class="water-surface"></div>
<div class="notif" id="notif"></div>

<div id="app">
  <!-- WORK SCREEN -->
  <div id="work-screen">
    <div class="screen-title">Deep Focus / 集中モード</div>
    <div class="fish-deco">🐟</div>
    <div class="timer-wrap">
      <svg class="timer-svg" viewBox="0 0 240 240" width="260" height="260">
        <circle class="ring-bg" cx="120" cy="120" r="110"/>
        <circle class="ring-fill" id="ringFill" cx="120" cy="120" r="110"/>
      </svg>
      <div class="timer-inner">
        <div class="phase-label" id="phaseLabel">作業時間</div>
        <div class="time-big" id="timeDisplay">25:00</div>
        <div class="session-dot-row" id="dotRow"></div>
      </div>
    </div>
    <div class="btns">
      <button class="btn" onclick="resetTimer()">リセット</button>
      <button class="btn btn-main" id="startBtn" onclick="toggleTimer()">スタート</button>
      <button class="btn" onclick="skipPhase()">スキップ</button>
    </div>
    <div class="session-info">セッション <span id="sessionNum">1</span> / 4</div>
  </div>

  <!-- BREAK SCREEN -->
  <div id="break-screen">
    <div class="break-top">
      <!-- Fishing -->
      <div class="fishing-panel">
        <div class="break-timer-row">
          <div class="break-timer-badge" id="breakTimerBadge">05:00</div>
          <div class="break-phase">休憩中 — 釣りをしよう</div>
        </div>
        <div class="catch-msg" id="catchMsg"></div>
        <canvas id="fishingCanvas" width="380" height="300"></canvas>
        <div class="fishing-hint" id="fishingHint">クリック or スペースキーで竿を振る！</div>
      </div>

      <!-- News -->
      <div class="news-panel">
        <div class="news-header">
          <div class="live-dot"></div>
          <div class="news-label">今日のニュース</div>
        </div>
        <div class="news-scroll" id="newsScroll">
          <div class="news-loading" id="newsLoading">ニュースを取得中…</div>
          <div id="newsList"></div>
        </div>
        <div class="ticker-bar">
          <div class="ticker-inner" id="tickerInner">— ニュースを読み込み中 —</div>
        </div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav-bar">
    <div class="nav-logo">Deep Focus</div>
    <div class="nav-right">
      <button class="nav-btn" id="skipBreakBtn" onclick="skipPhase()" style="display:none">作業に戻る</button>
      <button class="nav-btn" onclick="openCollection()">
        🎣 コレクション <span class="collection-badge" id="colBadge">0</span>
      </button>
    </div>
  </div>
</div>

<!-- COLLECTION OVERLAY -->
<div id="collection-overlay">
  <div class="collection-wrap">
    <div class="col-header">
      <div>
        <div class="col-title">Fish Collection</div>
        <div class="col-subtitle">釣り図鑑 — あなたが釣った魚たち</div>
      </div>
      <button class="col-close" onclick="closeCollection()">閉じる ✕</button>
    </div>
    <div class="col-stats">
      <div class="col-stat">
        <div class="cs-label">発見した魚</div>
        <div class="cs-val" id="statDiscovered">0</div>
      </div>
      <div class="col-stat">
        <div class="cs-label">総釣り数</div>
        <div class="cs-val" id="statTotal">0</div>
      </div>
      <div class="col-stat">
        <div class="cs-label">レアリティ最高</div>
        <div class="cs-val" id="statRarest">—</div>
      </div>
    </div>
    <div class="fish-grid" id="fishGrid"></div>
  </div>
</div>

<script>
// ========================
// FISH DATABASE
// ========================
const FISH_DB = [
  { id:'sardine',   emoji:'🐟', name:'イワシ',     rarity:'common',    weight:[0.1,0.3], flavor:'浅い海に群れる小魚' },
  { id:'bass',      emoji:'🎣', name:'バス',       rarity:'common',    weight:[0.5,2.0], flavor:'川でも釣れる人気魚' },
  { id:'carp',      emoji:'🐡', name:'コイ',       rarity:'common',    weight:[1.0,5.0], flavor:'池の主として知られる' },
  { id:'trout',     emoji:'🐠', name:'マス',       rarity:'common',    weight:[0.3,1.5], flavor:'清流に住む美しい魚' },
  { id:'catfish',   emoji:'🐡', name:'ナマズ',     rarity:'rare',      weight:[2.0,8.0], flavor:'ひげが特徴的な底魚' },
  { id:'pike',      emoji:'🐟', name:'カワカマス', rarity:'rare',      weight:[1.0,6.0], flavor:'鋭い歯を持つ淡水の猛者' },
  { id:'eel',       emoji:'🫁',  name:'ウナギ',     rarity:'rare',      weight:[0.5,2.0], flavor:'夜行性のぬめぬめした魚' },
  { id:'swordfish', emoji:'⚔️',  name:'メカジキ',  rarity:'epic',      weight:[50,200],  flavor:'長い吻が武器の大型魚' },
  { id:'tuna',      emoji:'🐋', name:'マグロ',     rarity:'epic',      weight:[80,300],  flavor:'回転寿司の主役' },
  { id:'shark',     emoji:'🦈', name:'サメ',       rarity:'epic',      weight:[100,500], flavor:'海の頂点捕食者' },
  { id:'anglerfish',emoji:'🎑', name:'チョウチンアンコウ', rarity:'legendary', weight:[5,20], flavor:'深海の幻の魚' },
  { id:'dragon',    emoji:'🐉', name:'幻の龍魚',   rarity:'legendary', weight:[999,999], flavor:'伝説の魚。釣った者に幸運が訪れる' },
];
const RARITY_WEIGHTS = { common:55, rare:30, epic:12, legendary:3 };

// ========================
// COLLECTION STORAGE
// ========================
let collection = {}; // id: { count, isNew }
let totalCaught = 0;
try {
  const saved = localStorage.getItem('deepfocus_collection');
  if (saved) { const d = JSON.parse(saved); collection = d.collection||{}; totalCaught = d.total||0; }
} catch(e){}
function saveCollection() {
  try { localStorage.setItem('deepfocus_collection', JSON.stringify({ collection, total: totalCaught })); } catch(e){}
}
function getDiscoveredCount() { return Object.keys(collection).length; }
function updateColBadge() { document.getElementById('colBadge').textContent = getDiscoveredCount(); }
updateColBadge();

// ========================
// TIMER
// ========================
const WORK_SEC = 25 * 60;
const BREAK_SEC = 5 * 60;
const CIRC = 2 * Math.PI * 110; // ~691.2

let isWork = true;
let running = false;
let remaining = WORK_SEC;
let total = WORK_SEC;
let sessionCount = 1;
let timerInterval = null;

const timeDisplay = document.getElementById('timeDisplay');
const startBtn = document.getElementById('startBtn');
const ringFill = document.getElementById('ringFill');
const phaseLabel = document.getElementById('phaseLabel');
const sessionNum = document.getElementById('sessionNum');
const dotRow = document.getElementById('dotRow');
const breakTimerBadge = document.getElementById('breakTimerBadge');

ringFill.style.strokeDasharray = CIRC;

function updateDots() {
  dotRow.innerHTML = '';
  for(let i=0;i<4;i++){
    const d = document.createElement('div');
    d.className = 'sdot' + (i < sessionCount-1 ? ' done' : '');
    dotRow.appendChild(d);
  }
}
updateDots();

function fmtTime(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function updateTimerDisplay() {
  timeDisplay.textContent = fmtTime(remaining);
  const pct = remaining / total;
  ringFill.style.strokeDashoffset = CIRC * (1 - pct);
  if(isWork) breakTimerBadge.textContent = fmtTime(remaining);
  else breakTimerBadge.textContent = fmtTime(remaining);
}

function toggleTimer() {
  if(running) {
    clearInterval(timerInterval);
    running = false;
    startBtn.textContent = 'スタート';
  } else {
    running = true;
    startBtn.textContent = 'ポーズ';
    timerInterval = setInterval(tick, 1000);
  }
}

function tick() {
  remaining--;
  updateTimerDisplay();
  if(remaining <= 0) {
    clearInterval(timerInterval);
    running = false;
    switchPhase();
  }
}

function switchPhase() {
  if(isWork) {
    // Work -> Break
    isWork = false;
    total = BREAK_SEC;
    remaining = BREAK_SEC;
    ringFill.classList.add('break');
    phaseLabel.textContent = '休憩時間';
    startBtn.textContent = 'スタート';
    showBreakScreen();
    playAlarm();
    showNotif('お疲れ様！5分休憩します 🎣 釣りをしましょう');
    loadNews();
    startFishingGame();
    document.getElementById('skipBreakBtn').style.display='block';
  } else {
    // Break -> Work
    isWork = true;
    if(sessionCount < 4) sessionCount++;
    else sessionCount = 1;
    total = WORK_SEC;
    remaining = WORK_SEC;
    ringFill.classList.remove('break');
    phaseLabel.textContent = '作業時間';
    startBtn.textContent = 'スタート';
    sessionNum.textContent = sessionCount;
    updateDots();
    showWorkScreen();
    stopFishingGame();
    showNotif('集中タイム開始！頑張りましょう 💪');
    document.getElementById('skipBreakBtn').style.display='none';
  }
  updateTimerDisplay();
}

function resetTimer() {
  clearInterval(timerInterval);
  running = false;
  isWork = true;
  total = WORK_SEC; remaining = WORK_SEC;
  ringFill.classList.remove('break');
  phaseLabel.textContent = '作業時間';
  startBtn.textContent = 'スタート';

  stopFishingGame();
  document.getElementById('skipBreakBtn').style.display='none';
  updateTimerDisplay();
}

function skipPhase() {
  clearInterval(timerInterval);
  running = false;
  remaining = 0;
  switchPhase();
}

// ========================
// ALARM SOUND
// ========================
function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.18);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i*0.18 + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.18 + 0.35);
      osc.start(ctx.currentTime + i*0.18);
      osc.stop(ctx.currentTime + i*0.18 + 0.4);
    });
  } catch(e){}
}

// ========================
// FISHING GAME
// ========================
const canvas = document.getElementById('fishingCanvas');
const ctx = canvas.getContext('2d');
let gameLoop = null;
let fishingState = 'idle'; // idle, casting, waiting, biting, reeling, caught
let rodAngle = 0;
let bobber = { x:0, y:0, vy:0, onWater:false };
let waterY = 120;
let fishEntities = [];
let particles = [];
let catchTimer = 0;
let biteTimer = 0;
let biteFlash = 0;
let rippleTime = 0;
let castAnim = 0;

function startFishingGame() {
  fishingState = 'idle';
  bobber = { x: 200, y: 60, vy:0, onWater:false };
  fishEntities = [];
  particles = [];
  spawnFishEntities();
  if(gameLoop) cancelAnimationFrame(gameLoop);
  gameLoop = requestAnimationFrame(fishingTick);
  canvas.onclick = handleFishingClick;
  document.addEventListener('keydown', fishingKeydown);
}

function stopFishingGame() {
  if(gameLoop) cancelAnimationFrame(gameLoop);
  gameLoop = null;
  canvas.onclick = null;
  document.removeEventListener('keydown', fishingKeydown);
}

function fishingKeydown(e) {
  if(e.code === 'Space') { e.preventDefault(); handleFishingClick(); }
}

function spawnFishEntities() {
  fishEntities = [];
  for(let i=0;i<5;i++) {
    fishEntities.push({
      x: Math.random()*300+30,
      y: waterY + 30 + Math.random()*120,
      vx: (Math.random()-0.5)*1.2,
      emoji: ['🐟','🐡','🐠','🫁'][Math.floor(Math.random()*4)],
      size: 18+Math.random()*10,
      attracted: false,
    });
  }
}

function handleFishingClick() {
  if(fishingState === 'idle') {
    fishingState = 'casting';
    castAnim = 0;
    bobber = { x: 95, y: 50, vy: -4, onWater:false };
  } else if(fishingState === 'biting') {
    fishingState = 'reeling';
    catchTimer = 60;
    biteFlash = 0;
  } else if(fishingState === 'waiting') {
    // missed
    setCatchMsg('空振り…もう少し早く！');
    resetFishing();
  }
}

function resetFishing() {
  setTimeout(() => {
    fishingState = 'idle';
    bobber = { x:200, y:60, vy:0, onWater:false };
    setCatchMsg('');
    document.getElementById('fishingHint').textContent = 'クリック or スペースキーで竿を振る！';
    spawnFishEntities();
  }, 1200);
}

function setCatchMsg(msg, color) {
  const el = document.getElementById('catchMsg');
  el.textContent = msg;
  el.style.color = color || 'var(--gold)';
}

let fishingTime = 0;
function fishingTick() {
  fishingTime++;
  ctx.clearRect(0,0, canvas.width, canvas.height);
  drawFishingScene();
  gameLoop = requestAnimationFrame(fishingTick);
}

function drawFishingScene() {
  const W = canvas.width, H = canvas.height;

  // Sky / water bg
  const skyGrad = ctx.createLinearGradient(0,0,0,waterY);
  skyGrad.addColorStop(0,'#071828');
  skyGrad.addColorStop(1,'#0a2840');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,waterY);

  // Water
  const waterGrad = ctx.createLinearGradient(0,waterY,0,H);
  waterGrad.addColorStop(0,'#0d3d5e');
  waterGrad.addColorStop(1,'#041520');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0,waterY,W,H-waterY);

  // Water surface shimmer
  for(let i=0;i<6;i++) {
    const wx = ((fishingTime*0.8 + i*55) % (W+40)) - 20;
    ctx.strokeStyle = `rgba(41,197,220,${0.1+Math.sin(fishingTime*0.05+i)*0.05})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(wx,waterY); ctx.lineTo(wx+30,waterY);
    ctx.stroke();
  }

  // Light rays in water
  ctx.save();
  for(let i=0;i<3;i++){
    const rx = 80+i*120 + Math.sin(fishingTime*0.01+i)*20;
    const rGrad = ctx.createLinearGradient(rx,waterY,rx+20,H);
    rGrad.addColorStop(0,'rgba(41,197,220,0.04)');
    rGrad.addColorStop(1,'rgba(41,197,220,0)');
    ctx.fillStyle = rGrad;
    ctx.beginPath();
    ctx.moveTo(rx,waterY); ctx.lineTo(rx+30,waterY);
    ctx.lineTo(rx+50,H); ctx.lineTo(rx-15,H);
    ctx.fill();
  }
  ctx.restore();

  // Rod (player at left edge)
  const rodX = 30, rodY = 45;
  ctx.strokeStyle = '#8b6c3c';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const tipX = rodX + 60;
  const tipY = rodY - 15;
  ctx.beginPath();
  ctx.moveTo(rodX, rodY+20);
  ctx.quadraticCurveTo(rodX+30, rodY, tipX, tipY);
  ctx.stroke();
  // Handle
  ctx.fillStyle='#5a3e1e'; ctx.fillRect(rodX-6, rodY+15, 12, 35);

  // Fishing line
  if(fishingState !== 'idle') {
    ctx.strokeStyle = 'rgba(200,230,240,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(bobber.x, bobber.y);
    ctx.stroke();
  }

  // Physics
  if(fishingState === 'casting') {
    castAnim++;
    bobber.vy += 0.25;
    bobber.x += 3.5;
    bobber.y += bobber.vy;
    if(bobber.y >= waterY) {
      bobber.y = waterY;
      bobber.vy = 0;
      bobber.onWater = true;
      fishingState = 'waiting';
      biteTimer = 600 + Math.random()*1200;
      rippleTime = 20;
      document.getElementById('fishingHint').textContent = '当たりを待って…クリックで合わせる！';
    }
  }

  if(fishingState === 'waiting' || fishingState === 'biting') {
    // bobber bob
    const bob = Math.sin(fishingTime * 0.08) * 3;
    bobber.y = waterY + bob;
    biteTimer--;
    if(biteTimer <= 0 && fishingState === 'waiting') {
      fishingState = 'biting';
      biteFlash = 1800;
      document.getElementById('fishingHint').textContent = '🎯 今だ！クリックして合わせろ！';
    }
    if(fishingState === 'biting') {
      biteFlash--;
      bobber.y = waterY + 6 + Math.sin(fishingTime*0.3)*2;
      if(biteFlash <= 0) {
        setCatchMsg('逃げられた…');
        resetFishing();
        document.getElementById('fishingHint').textContent = 'クリック or スペースキーで竿を振る！';
      }
    }
  }

  if(fishingState === 'reeling') {
    catchTimer--;
    bobber.y -= 2;
    bobber.x -= 1;
    // sparkle
    if(fishingTime%3===0) {
      particles.push({
        x:bobber.x, y:bobber.y,
        vx:(Math.random()-0.5)*3, vy:-Math.random()*2-1,
        life:30, color:`hsl(${Math.random()*60+180},80%,70%)`
      });
    }
    if(catchTimer <= 0) {
      // Catch!
      const fish = rollFish();
      doFishCatch(fish);
      fishingState = 'idle';
      setTimeout(()=>{ spawnFishEntities(); }, 1500);
    }
  }

  // Ripple
  if(rippleTime > 0) {
    rippleTime--;
    const r = (20-rippleTime)*3;
    ctx.strokeStyle = `rgba(41,197,220,${rippleTime/25*0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(bobber.x, waterY, r, r*0.3, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // Bobber
  if(fishingState !== 'idle') {
    // Flash if biting
    const flash = fishingState==='biting' && fishingTime%4<2;
    ctx.fillStyle = flash ? '#ff3333' : '#e84040';
    ctx.beginPath();
    ctx.arc(bobber.x, bobber.y, 5, Math.PI, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.arc(bobber.x, bobber.y, 5, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(bobber.x, bobber.y, 5, 0, Math.PI*2); ctx.stroke();
  }

  // Fish entities
  fishEntities.forEach(f => {
    // attraction to bobber
    if(fishingState==='waiting'||fishingState==='biting') {
      const dx = bobber.x - f.x, dy = bobber.y+20 - f.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<120) { f.vx += dx/dist*0.04; f.vy += dy/dist*0.04; }
    }
    f.x += f.vx; f.y += f.vy;
    f.vx *= 0.98; f.vy *= 0.98;
    // wander
    f.vx += (Math.random()-0.5)*0.08;
    f.vy += (Math.random()-0.5)*0.04;
    // bounds
    if(f.x<20){f.x=20;f.vx=Math.abs(f.vx);}
    if(f.x>W-20){f.x=W-20;f.vx=-Math.abs(f.vx);}
    if(f.y<waterY+15){f.y=waterY+15;f.vy=Math.abs(f.vy);}
    if(f.y>H-15){f.y=H-15;f.vy=-Math.abs(f.vy);}
    ctx.save();
    ctx.translate(f.x,f.y);
    if(f.vx<0) ctx.scale(-1,1);
    ctx.font = `${f.size}px serif`;
    ctx.fillText(f.emoji, -f.size/2, f.size/3);
    ctx.restore();
  });

  // Particles
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    ctx.globalAlpha = p.life/30;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Cast hint arrow
  if(fishingState==='idle') {
    ctx.fillStyle = `rgba(41,197,220,${0.4+Math.sin(fishingTime*0.1)*0.2})`;
    ctx.font='12px Space Mono';
    ctx.fillText('▼ Click!', 60, 35);
  }

  // Waiting hint (last 5 sec before bite)
  if(fishingState==='waiting' && biteTimer < 300) {
    const alpha = (300 - biteTimer) / 300 * 0.5;
    ctx.save();
    ctx.fillStyle = `rgba(41,197,220,${alpha})`;
    ctx.font = '11px Space Mono';
    ctx.textAlign = 'center';
    ctx.fillText('なにかいる…', W/2, waterY - 12);
    ctx.restore();
  }

  // Biting indicator + countdown bar
  if(fishingState==='biting') {
    ctx.save();
    ctx.fillStyle = `rgba(255,100,100,${0.7+Math.sin(fishingTime*0.5)*0.3})`;
    ctx.font = 'bold 18px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎯 BITE!!', W/2, waterY - 30);
    // countdown bar
    const pct = biteFlash / 1800;
    const barW = 160, barX = W/2 - 80, barY = waterY - 20;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX, barY, barW, 7);
    ctx.fillStyle = pct > 0.5 ? '#29c5dc' : pct > 0.25 ? '#f0c060' : '#ff6b6b';
    ctx.fillRect(barX, barY, barW * pct, 7);
    const secsLeft = Math.ceil(biteFlash / 60);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '10px Space Mono';
    ctx.textAlign = 'center';
    ctx.fillText(`${secsLeft}秒以内にクリック！`, W/2, waterY - 6);
    ctx.restore();
  }
}

function rollFish() {
  const totalW = Object.values(RARITY_WEIGHTS).reduce((a,b)=>a+b,0);
  let r = Math.random() * totalW;
  let rarity = 'common';
  for(const [k,v] of Object.entries(RARITY_WEIGHTS)) {
    r -= v;
    if(r <= 0) { rarity = k; break; }
  }
  const pool = FISH_DB.filter(f=>f.rarity===rarity);
  return pool[Math.floor(Math.random()*pool.length)];
}

function doFishCatch(fish) {
  const isNew = !collection[fish.id];
  if(!collection[fish.id]) collection[fish.id] = { count:0, isNew:true };
  else collection[fish.id].isNew = false;
  collection[fish.id].count++;
  totalCaught++;
  saveCollection();
  updateColBadge();

  const rarityLabels = { common:'普通', rare:'レア', epic:'エピック', legendary:'伝説' };
  setCatchMsg(`${fish.emoji} ${fish.name}を釣った！${isNew?'  [ 初発見! ]':''} ${rarityLabels[fish.rarity]}`, 
    fish.rarity==='legendary'?'#ff6b6b':fish.rarity==='epic'?'#c87ef0':fish.rarity==='rare'?'var(--gold)':'var(--accent)');

  // Particle burst at bobber
  for(let i=0;i<20;i++){
    particles.push({
      x:bobber.x, y:bobber.y,
      vx:(Math.random()-0.5)*6,
      vy:-Math.random()*4-2,
      life:50,
      color: fish.rarity==='legendary'?`hsl(${Math.random()*30},100%,60%)`:
             fish.rarity==='epic'?`hsl(${280+Math.random()*30},80%,70%)`:
             fish.rarity==='rare'?`hsl(${40+Math.random()*20},90%,65%)`:`hsl(${180+Math.random()*40},70%,65%)`
    });
  }
  playAlarm(); // subtle sound
  showNotif(isNew ? `🎉 新発見！ ${fish.emoji} ${fish.name}` : `🐟 ${fish.name}を釣った！`);
  document.getElementById('fishingHint').textContent = 'クリック or スペースキーで竿を振る！';
}

// ========================
// NEWS
// ========================
let newsLoaded = false;
async function loadNews() {
  if(newsLoaded) return;
  newsLoaded = true;
  try {
    const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`${today}の日本と世界の主要ニュース6件を以下のJSONのみで返してください（前置き・マークダウン不要）:\n{"news":[{"category":"カテゴリ","title":"見出し","summary":"1〜2文の概要"}]}`}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match = text.match(/\{[\s\S]*\}/);
    const parsed = match ? JSON.parse(match[0]) : null;
    if(parsed?.news?.length) {
      renderNews(parsed.news);
    } else {
      document.getElementById('newsLoading').textContent='ニュースを取得できませんでした';
    }
  } catch(e) {
    document.getElementById('newsLoading').textContent='ニュースの取得に失敗しました';
  }
}

function renderNews(items) {
  document.getElementById('newsLoading').style.display='none';
  const list = document.getElementById('newsList');
  items.forEach((n,i)=>{
    const el = document.createElement('div');
    el.className='news-item';
    el.style.animationDelay=(i*0.1)+'s';
    el.innerHTML=`<div class="n-cat">${n.category}</div><div class="n-title">${n.title}</div><div class="n-summary">${n.summary}</div>`;
    list.appendChild(el);
  });
  document.getElementById('tickerInner').textContent =
    items.map(n=>`【${n.category}】 ${n.title}`).join('　　　 ');
}

// COLLECTION UI
// ========================
function openCollection() {
  renderCollection();
  document.getElementById('collection-overlay').classList.add('open');
}
function closeCollection() {
  document.getElementById('collection-overlay').classList.remove('open');
}

function renderCollection() {
  const grid = document.getElementById('fishGrid');
  grid.innerHTML = '';
  const discovered = getDiscoveredCount();
  document.getElementById('statDiscovered').textContent = `${discovered}/${FISH_DB.length}`;
  document.getElementById('statTotal').textContent = totalCaught;
  const rarityOrder = ['legendary','epic','rare','common'];
  const rarest = rarityOrder.find(r => FISH_DB.filter(f=>f.rarity===r).some(f=>collection[f.id])) || '—';
  const rarityJP = {legendary:'伝説',epic:'エピック',rare:'レア',common:'普通','—':'—'};
  document.getElementById('statRarest').textContent = rarityJP[rarest];

  FISH_DB.forEach(fish=>{
    const owned = collection[fish.id];
    const card = document.createElement('div');
    card.className = 'fish-card' + (owned?'':' undiscovered') + (owned?.isNew?' new-badge':'');
    const rarityLabel = {common:'普通',rare:'レア',epic:'エピック',legendary:'伝説'}[fish.rarity];
    card.innerHTML = `
      <span class="fc-emoji">${owned?fish.emoji:'❓'}</span>
      <div class="fc-name">${owned?fish.name:'???'}</div>
      <div class="fc-rarity rarity-${fish.rarity}">${rarityLabel}</div>
      ${owned?`<div class="fc-count">×${owned.count}匹</div>`:''}
      ${owned?`<div class="fc-count" style="font-size:8px;color:var(--muted);margin-top:3px">${fish.flavor}</div>`:''}
    `;
    if(owned?.isNew) { owned.isNew=false; saveCollection(); }
    grid.appendChild(card);
  });
}
